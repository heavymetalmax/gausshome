<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gausshome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      background: #f5f4f0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .logo-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: clamp(120px, 32vw, 218px);
    }

    .logo {
      width: 100%;
      height: auto;
      opacity: 0;
      transform: scale(0.94);
      transition: opacity .35s ease, transform .5s cubic-bezier(.22, 1, .36, 1);
    }

    .splash-subtitle {
      margin-top: clamp(10px, 3vw, 16px);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(11px, 3vw, 14px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #999;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .35s ease, transform .5s cubic-bezier(.22, 1, .36, 1);
    }

    body.phase-logo .logo {
      opacity: 1;
      transform: scale(1);
    }

    body.phase-logo .splash-subtitle {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .splash-subtitle {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="logo-lockup">
    <img class="logo" src="assets/Logo.svg" alt="Gauss">
    <div class="splash-subtitle">Coming Soon</div>
  </div>

  <script>
    (function () {
      var body = document.body;
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) {
        body.classList.add('phase-logo');
        return;
      }
      requestAnimationFrame(function () {
        body.classList.add('phase-logo');
      });
    })();
  </script>
</body>
</html>
